<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運行日報</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">

        <div class="modal-overlay" id="settings-modal" role="dialog">
            <div class="modal-sheet">
                <div class="modal-title">設定</div>
                <div class="setting-block">
                    <div class="setting-block-title">GAS URL</div>
                    <input type="text" id="gas-url-input" placeholder="https://script.google.com/...">
                </div>
                <div class="setting-block">
                    <div class="setting-block-title">パスコード</div>
                    <input type="password" id="passcode-input" placeholder="送信用パスコード">
                </div>
                <div class="setting-block">
                    <div class="setting-block-title">車両リスト</div>
                    <div class="tag-list" id="vehicle-tag-list"></div>
                    <div class="input-add-row">
                        <input type="text" id="input-add-vehicle" placeholder="車両名を入力">
                        <button class="btn-add" id="btn-add-vehicle">追加</button>
                    </div>
                </div>
                <div class="setting-block">
                    <div class="setting-block-title">運転者リスト</div>
                    <div class="tag-list" id="driver-tag-list"></div>
                    <div class="input-add-row">
                        <input type="text" id="input-add-driver" placeholder="名前を入力">
                        <button class="btn-add" id="btn-add-driver">追加</button>
                    </div>
                </div>
                <div class="setting-block">
                    <div class="setting-block-title">確認者リスト</div>
                    <div class="tag-list" id="checker-tag-list"></div>
                    <div class="input-add-row">
                        <input type="text" id="input-add-checker" placeholder="名前を入力">
                        <button class="btn-add" id="btn-add-checker">追加</button>
                    </div>
                </div>
                <button class="btn-submit" id="btn-save-settings">設定を保存</button>
                <button class="btn-secondary" id="btn-close-settings">閉じる</button>
            </div>
        </div>

        <div id="view-home" class="view active">
            <header class="app-header">
                <h2>運行日報 ホーム</h2>
                <button class="btn-icon" id="btn-settings" aria-label="設定">⚙ 設定</button>
            </header>

            <div class="section-card" style="margin-top: 16px;">
                <div class="section-body">
                    <div class="field-row">
                        <div class="field-group" style="flex:1">
                            <label class="field-label" for="report-date" style="display:none;">日付</label>
                            <input type="date" id="report-date">
                        </div>
                        <div class="field-group" style="flex:2">
                            <label class="field-label" for="vehicle-id" style="display:none;">車両</label>
                            <select id="vehicle-id">
                                <option value="">-- 車両を選択してください --</option>
                            </select>
                        </div>
                        <div class="field-group" style="flex:0 0 auto;">
                            <!-- QRスキャンボタン（ダミー枠 / 赤枠） -->
                            <button id="btn-qr-scan" class="btn-qr-dummy">QR</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="task-list">
                <button class="task-btn" onclick="switchView('view-pre-check')">
                    <span class="task-name">1. アルコールチェック 1</span>
                    <span class="task-status badge-warning" id="badge-pre-check">未送信</span>
                </button>
                <button class="task-btn" onclick="switchView('view-post-check')">
                    <span class="task-name">2. アルコールチェック 2</span>
                    <span class="task-status badge-warning" id="badge-post-check">未送信</span>
                </button>
                <button class="task-btn" onclick="switchView('view-record-1')">
                    <span class="task-name">3. 運転記録 1</span>
                    <span class="task-status badge-warning" id="badge-record-1">未送信</span>
                </button>
                <button class="task-btn" onclick="switchView('view-record-2')">
                    <span class="task-name">4. 運転記録 2</span>
                    <span class="task-status badge-warning" id="badge-record-2">未送信</span>
                </button>
                <button class="task-btn" onclick="switchView('view-record-3')">
                    <span class="task-name">5. 運転記録 3</span>
                    <span class="task-status badge-warning" id="badge-record-3">未送信</span>
                </button>
                <button class="task-btn" onclick="switchView('view-refuel')">
                    <span class="task-name">6. 給油、その他</span>
                    <span class="task-status badge-warning" id="badge-refuel">入力可</span>
                </button>
            </div>
        </div>

        <div id="view-pre-check" class="view">
            <header class="app-header">
                <button class="btn-icon btn-back" onclick="switchView('view-home')">◀ 戻る</button>
                <h2>アルコールチェック 1</h2>
                <div style="width: 60px;"></div>
            </header>
            <div class="section-body" style="padding: 20px 16px;">
                <div class="field-row">
                    <div class="field-group" style="flex:1">
                        <label class="field-label" for="pre-check-time">確認時刻</label>
                        <div class="time-input-row">
                            <input type="time" id="pre-check-time" style="flex:1;">
                            <button class="btn-secondary" onclick="setCurrentTime('pre-check-time')"
                                style="width:auto; padding:0 12px;">今</button>
                        </div>
                    </div>
                    <div class="field-group" style="flex:1">
                        <label class="field-label">確認方法</label>
                        <div class="radio-group" role="group">
                            <label><input type="radio" name="pre-check-method" value="対面"
                                    checked><span>対面</span></label>
                            <label><input type="radio" name="pre-check-method" value="電話"><span>電話</span></label>
                        </div>
                    </div>
                </div>
                <div class="field-group">
                    <label class="field-label" for="pre-checker">確認者</label>
                    <select id="pre-checker">
                        <option value="">-- 選択 --</option>
                    </select>
                </div>
                <div class="field-group">
                    <label class="field-label">酒気帯び</label>
                    <div class="radio-group" role="group">
                        <label><input type="radio" name="pre-alcohol" value="無" checked><span>無</span></label>
                        <label><input type="radio" name="pre-alcohol" value="有"><span>有</span></label>
                    </div>
                </div>
                <div class="field-group" id="pre-alcohol-val-group" style="display:none">
                    <label class="field-label" for="pre-alcohol-val">アルコール数値</label>
                    <input type="text" id="pre-alcohol-val" placeholder="例: 0.00">
                </div>
                <div class="status-msg" id="status-pre-check"></div>
                <button class="btn-submit" id="btn-submit-pre-check">送信してホームに戻る</button>
            </div>
        </div>

        <div id="view-record-1" class="view">
            <header class="app-header">
                <button class="btn-icon btn-back" onclick="switchView('view-home')">◀ 戻る</button>
                <h2>運転記録 1</h2>
                <div style="width: 60px;"></div>
            </header>
            <div class="section-body" style="padding: 20px 16px;">

                <div id="record-1-departure-inputs">
                    <div class="field-group">
                        <label class="field-label">運行前点検</label>
                        <div class="radio-group" role="group">
                            <label><input type="radio" name="pre-inspection-1" value="実施"
                                    checked><span>実施</span></label>
                            <label><input type="radio" name="pre-inspection-1" value="未実施"><span>未実施</span></label>
                        </div>
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="driver-name-1">運転者</label>
                        <select id="driver-name-1">
                            <option value="">-- 選択 --</option>
                        </select>
                    </div>
                    <div class="field-row">
                        <div class="field-group">
                            <label class="field-label" for="start-time-1">出発時刻</label>
                            <div class="time-input-row">
                                <input type="time" id="start-time-1" style="flex: 1;">
                                <button class="btn-secondary" onclick="setCurrentTime('start-time-1')"
                                    style="width:auto; padding:0 12px;">今</button>
                            </div>
                        </div>
                        <div class="field-group">
                            <label class="field-label" for="start-meter-1">出発メーター (km)</label>
                            <input type="number" id="start-meter-1" placeholder="0">
                        </div>
                    </div>
                </div>

                <button class="btn-submit" id="btn-start-record-1"
                    style="background-color: #ff9900; box-shadow: 0 2px 4px rgba(255,153,0,0.3);">出発を記録 (一時保存)</button>

                <div id="record-1-arrival" class="phase-arrival">
                    <p style="font-weight:bold; color:#0066cc; margin-bottom:12px;">🚗 運転中... 到着したら入力して送信してください</p>

                    <div class="field-group">
                        <label class="field-label" for="destination-1">訪問先・現場名等</label>
                        <input type="text" id="destination-1" placeholder="到着した訪問先を入力">
                    </div>

                    <div class="field-row">
                        <div class="field-group">
                            <label class="field-label" for="end-time-1">到着時刻</label>
                            <div class="time-input-row">
                                <input type="time" id="end-time-1" style="flex: 1;">
                                <button class="btn-secondary" onclick="setCurrentTime('end-time-1')"
                                    style="width:auto; padding:0 12px;">今</button>
                            </div>
                        </div>
                        <div class="field-group">
                            <label class="field-label" for="end-meter-1">到着メーター (km)</label>
                            <input type="number" id="end-meter-1" placeholder="0">
                        </div>
                    </div>
                    <div class="field-group">
                        <label class="field-label">走行距離</label>
                        <div class="distance-display"><span class="value" id="calc-distance-1">—</span><span> km</span>
                        </div>
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="vehicle-return-1">車両持帰</label>
                        <select id="vehicle-return-1">
                            <option value="">-- 選択 --</option>
                            <option value="会社">会社</option>
                            <option value="持帰">持帰</option>
                        </select>
                    </div>
                    <div class="status-msg" id="status-record-1"></div>
                    <button class="btn-submit" id="btn-submit-record-1">到着を記録して送信</button>
                    <button class="btn-secondary" id="btn-cancel-record-1"
                        style="margin-top: 12px; color: #cc0000; border-color: #cc0000;">出発を取り消す</button>
                </div>
            </div>
        </div>

        <div id="view-record-2" class="view">
            <header class="app-header">
                <button class="btn-icon btn-back" onclick="switchView('view-home')">◀ 戻る</button>
                <h2>運転記録 2</h2>
                <div style="width: 60px;"></div>
            </header>
            <div class="section-body" style="padding: 20px 16px;">
                <button class="btn-secondary" id="btn-copy-meter-2" style="margin-bottom: 10px;">↑
                    記録1の到着メーターをコピー</button>

                <div id="record-2-departure-inputs">
                    <div class="field-group">
                        <label class="field-label">運行前点検</label>
                        <div class="radio-group" role="group">
                            <label><input type="radio" name="pre-inspection-2" value="実施"
                                    checked><span>実施</span></label>
                            <label><input type="radio" name="pre-inspection-2" value="未実施"><span>未実施</span></label>
                        </div>
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="driver-name-2">運転者</label>
                        <select id="driver-name-2">
                            <option value="">-- 選択 --</option>
                        </select>
                    </div>
                    <div class="field-row">
                        <div class="field-group">
                            <label class="field-label" for="start-time-2">出発時刻</label>
                            <div class="time-input-row">
                                <input type="time" id="start-time-2" style="flex: 1;">
                                <button class="btn-secondary" onclick="setCurrentTime('start-time-2')"
                                    style="width:auto; padding:0 12px;">今</button>
                            </div>
                        </div>
                        <div class="field-group">
                            <label class="field-label" for="start-meter-2">出発メーター (km)</label>
                            <input type="number" id="start-meter-2" placeholder="0">
                        </div>
                    </div>
                </div>

                <button class="btn-submit" id="btn-start-record-2"
                    style="background-color: #ff9900; box-shadow: 0 2px 4px rgba(255,153,0,0.3);">出発を記録 (一時保存)</button>

                <div id="record-2-arrival" class="phase-arrival">
                    <p style="font-weight:bold; color:#0066cc; margin-bottom:12px;">🚗 運転中... 到着したら入力して送信してください</p>
                    <div class="field-group">
                        <label class="field-label" for="destination-2">訪問先・現場名等</label>
                        <input type="text" id="destination-2" placeholder="到着した訪問先を入力">
                    </div>
                    <div class="field-row">
                        <div class="field-group">
                            <label class="field-label" for="end-time-2">到着時刻</label>
                            <div class="time-input-row">
                                <input type="time" id="end-time-2" style="flex: 1;">
                                <button class="btn-secondary" onclick="setCurrentTime('end-time-2')"
                                    style="width:auto; padding:0 12px;">今</button>
                            </div>
                        </div>
                        <div class="field-group">
                            <label class="field-label" for="end-meter-2">到着メーター (km)</label>
                            <input type="number" id="end-meter-2" placeholder="0">
                        </div>
                    </div>
                    <div class="field-group">
                        <label class="field-label">走行距離</label>
                        <div class="distance-display"><span class="value" id="calc-distance-2">—</span><span> km</span>
                        </div>
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="vehicle-return-2">車両持帰</label>
                        <select id="vehicle-return-2">
                            <option value="">-- 選択 --</option>
                            <option value="会社">会社</option>
                            <option value="持帰">持帰</option>
                        </select>
                    </div>
                    <div class="status-msg" id="status-record-2"></div>
                    <button class="btn-submit" id="btn-submit-record-2">到着を記録して送信</button>
                    <button class="btn-secondary" id="btn-cancel-record-2"
                        style="margin-top: 12px; color: #cc0000; border-color: #cc0000;">出発を取り消す</button>
                </div>
            </div>
        </div>

        <div id="view-record-3" class="view">
            <header class="app-header">
                <button class="btn-icon btn-back" onclick="switchView('view-home')">◀ 戻る</button>
                <h2>運転記録 3</h2>
                <div style="width: 60px;"></div>
            </header>
            <div class="section-body" style="padding: 20px 16px;">
                <button class="btn-secondary" id="btn-copy-meter-3" style="margin-bottom: 10px;">↑
                    記録2の到着メーターをコピー</button>

                <div id="record-3-departure-inputs">
                    <div class="field-group">
                        <label class="field-label">運行前点検</label>
                        <div class="radio-group" role="group">
                            <label><input type="radio" name="pre-inspection-3" value="実施"
                                    checked><span>実施</span></label>
                            <label><input type="radio" name="pre-inspection-3" value="未実施"><span>未実施</span></label>
                        </div>
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="driver-name-3">運転者</label>
                        <select id="driver-name-3">
                            <option value="">-- 選択 --</option>
                        </select>
                    </div>
                    <div class="field-row">
                        <div class="field-group">
                            <label class="field-label" for="start-time-3">出発時刻</label>
                            <div class="time-input-row">
                                <input type="time" id="start-time-3" style="flex: 1;">
                                <button class="btn-secondary" onclick="setCurrentTime('start-time-3')"
                                    style="width:auto; padding:0 12px;">今</button>
                            </div>
                        </div>
                        <div class="field-group">
                            <label class="field-label" for="start-meter-3">出発メーター (km)</label>
                            <input type="number" id="start-meter-3" placeholder="0">
                        </div>
                    </div>
                </div>

                <button class="btn-submit" id="btn-start-record-3"
                    style="background-color: #ff9900; box-shadow: 0 2px 4px rgba(255,153,0,0.3);">出発を記録 (一時保存)</button>

                <div id="record-3-arrival" class="phase-arrival">
                    <p style="font-weight:bold; color:#0066cc; margin-bottom:12px;">🚗 運転中... 到着したら入力して送信してください</p>
                    <div class="field-group">
                        <label class="field-label" for="destination-3">訪問先・現場名等</label>
                        <input type="text" id="destination-3" placeholder="到着した訪問先を入力">
                    </div>
                    <div class="field-row">
                        <div class="field-group">
                            <label class="field-label" for="end-time-3">到着時刻</label>
                            <div class="time-input-row">
                                <input type="time" id="end-time-3" style="flex: 1;">
                                <button class="btn-secondary" onclick="setCurrentTime('end-time-3')"
                                    style="width:auto; padding:0 12px;">今</button>
                            </div>
                        </div>
                        <div class="field-group">
                            <label class="field-label" for="end-meter-3">到着メーター (km)</label>
                            <input type="number" id="end-meter-3" placeholder="0">
                        </div>
                    </div>
                    <div class="field-group">
                        <label class="field-label">走行距離</label>
                        <div class="distance-display"><span class="value" id="calc-distance-3">—</span><span> km</span>
                        </div>
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="vehicle-return-3">車両持帰</label>
                        <select id="vehicle-return-3">
                            <option value="">-- 選択 --</option>
                            <option value="会社">会社</option>
                            <option value="持帰">持帰</option>
                        </select>
                    </div>
                    <div class="status-msg" id="status-record-3"></div>
                    <button class="btn-submit" id="btn-submit-record-3">到着を記録して送信</button>
                    <button class="btn-secondary" id="btn-cancel-record-3"
                        style="margin-top: 12px; color: #cc0000; border-color: #cc0000;">出発を取り消す</button>
                </div>
            </div>
        </div>

        <div id="view-refuel" class="view">
            <header class="app-header">
                <button class="btn-icon btn-back" onclick="switchView('view-home')">◀ 戻る</button>
                <h2>給油、その他</h2>
                <div style="width: 60px;"></div>
            </header>
            <div class="section-body" style="padding: 20px 16px;">
                <p style="font-size: 0.85rem; color: #555; margin-bottom: 10px;">
                    給油情報は乗車後チェックと一緒に送信されます。入力後、そのままホームに戻ってください。</p>
                <div class="field-row">
                    <div class="field-group">
                        <label class="field-label" for="refuel-amount">給油量 (L)</label>
                        <input type="number" id="refuel-amount" placeholder="0">
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="refuel-meter">給油メーター (km)</label>
                        <input type="number" id="refuel-meter" placeholder="0">
                    </div>
                </div>
                <div class="field-group">
                    <label class="field-label" for="notes">備考</label>
                    <input type="text" id="notes" placeholder="特記事項など">
                </div>
                <button class="btn-submit" style="margin-top: 20px;" onclick="switchView('view-home')">ホームに戻る</button>
            </div>
        </div>

        <div id="view-post-check" class="view">
            <header class="app-header">
                <button class="btn-icon btn-back" onclick="switchView('view-home')">◀ 戻る</button>
                <h2>アルコールチェック 2</h2>
                <div style="width: 60px;"></div>
            </header>
            <div class="section-body" style="padding: 20px 16px;">
                <div class="field-row">
                    <div class="field-group" style="flex:1">
                        <label class="field-label" for="post-check-time">確認時刻</label>
                        <div class="time-input-row">
                            <input type="time" id="post-check-time" style="flex:1;">
                            <button class="btn-secondary" onclick="setCurrentTime('post-check-time')"
                                style="width:auto; padding:0 12px;">今</button>
                        </div>
                    </div>
                    <div class="field-group" style="flex:1">
                        <label class="field-label">確認方法</label>
                        <div class="radio-group" role="group">
                            <label><input type="radio" name="post-check-method" value="対面"
                                    checked><span>対面</span></label>
                            <label><input type="radio" name="post-check-method" value="電話"><span>電話</span></label>
                        </div>
                    </div>
                </div>
                <div class="field-group">
                    <label class="field-label" for="post-checker">確認者</label>
                    <select id="post-checker">
                        <option value="">-- 選択 --</option>
                    </select>
                </div>
                <div class="field-group">
                    <label class="field-label">酒気帯び</label>
                    <div class="radio-group" role="group">
                        <label><input type="radio" name="post-alcohol" value="無" checked><span>無</span></label>
                        <label><input type="radio" name="post-alcohol" value="有"><span>有</span></label>
                    </div>
                </div>
                <div class="status-msg" id="status-post-check"></div>
                <button class="btn-submit" id="btn-submit-post-check">送信してホームに戻る</button>
            </div>
        </div>

    </div>
    <script src="app.js"></script>
    <script src="form.js"></script>
    <script src="gas.js"></script>
</body>

</html>
